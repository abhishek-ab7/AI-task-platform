name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Backend Tests
        run: |
          cd backend
          npm ci
          npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Worker Tests
        run: |
          cd worker
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
          PYTHONPATH=. pytest

  build-and-push:
    name: Build & Push Container Images
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: vars
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:${{ env.SHA_SHORT }}

      - name: Build & Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:${{ env.SHA_SHORT }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:${{ env.SHA_SHORT }}

  update-infra-repo:
    name: GitOps Tag Update in Infra Repo
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Infrastructure Repository
        uses: actions/checkout@v4
        with:
          repository: 'example-user/ai-task-platform-infra'
          token: ${{ secrets.GITOPS_GITHUB_TOKEN }}
          path: infra-repo

      - name: Update Manifest Image Tags
        run: |
          cd infra-repo/k8s
          sed -i "s|image: .*/ai-task-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:${{ env.SHA_SHORT }}|g" 05-backend.yaml
          sed -i "s|image: .*/ai-task-worker:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:${{ env.SHA_SHORT }}|g" 06-worker.yaml
          sed -i "s|image: .*/ai-task-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:${{ env.SHA_SHORT }}|g" 07-frontend.yaml

      - name: Commit and Push to GitOps Repo
        run: |
          cd infra-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git commit -m "ci: update image tags to ${{ env.SHA_SHORT }}"
          git push origin main
